version: '3.8'

services:
  postgres-primary:
    image: postgres:15
    container_name: postgres-primary
    environment:
      POSTGRES_PASSWORD: admin123
      POSTGRES_USER: admin
      POSTGRES_DB: postgres
    ports:
      - "5444:5432"
    volumes:
      - ./primary_data:/var/lib/postgresql/data
      - ./scripts:/scripts
      - ./init-primary.sh:/docker-entrypoint-initdb.d/init-primary.sh
    networks:
      - pg-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-replica:
    image: postgres:15
    container_name: postgres-replica
    environment:
      POSTGRES_PASSWORD: admin123
      POSTGRES_USER: admin
      POSTGRES_DB: postgres
    ports:
      - "5445:5432"
    volumes:
      - ./replica_data:/var/lib/postgresql/data
      - ./scripts:/scripts
      - ./init-replica.sh:/docker-entrypoint-initdb.d/init-replica.sh
    networks:
      - pg-network
    depends_on:
      postgres-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  pg-network:
    driver: bridge